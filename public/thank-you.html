<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | Janrenzo Facto</title>

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, Helvetica, sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(190, 255, 47, 0.16), transparent 28%),
          radial-gradient(circle at 80% 10%, rgba(255, 255, 255, 0.08), transparent 26%),
          #050605;
        color: white;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 780px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 36px;
        background: rgba(255, 255, 255, 0.045);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.45);
        padding: clamp(32px, 6vw, 70px);
        text-align: center;
        backdrop-filter: blur(18px);
      }

      .badge {
        display: inline-flex;
        margin-bottom: 22px;
        border: 1px solid rgba(190, 255, 47, 0.35);
        border-radius: 999px;
        padding: 10px 16px;
        color: #befc35;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(48px, 10vw, 110px);
        line-height: 0.9;
        letter-spacing: -0.08em;
        text-transform: uppercase;
      }

      p {
        max-width: 560px;
        margin: 28px auto 0;
        color: rgba(255, 255, 255, 0.62);
        font-size: 18px;
        line-height: 1.7;
      }

      .actions {
        margin-top: 38px;
        display: flex;
        justify-content: center;
        gap: 14px;
        flex-wrap: wrap;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 54px;
        border-radius: 999px;
        padding: 0 28px;
        text-decoration: none;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .home {
        background: #befc35;
        color: #050605;
      }

      .email {
        border: 1px solid rgba(255, 255, 255, 0.16);
        color: white;
      }

      .footer {
        margin-top: 34px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.35);
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
    </style>
  </head>

  <body>
    <main class="card">
      <div class="badge">Message Received</div>

      <h1>Thank You.</h1>

      <p>
        Your project inquiry has been sent successfully. I’ll review your details and get back to you as soon as possible.
      </p>

      <div class="actions">
        <a class="home" href="/">Back to Home</a>
        <a class="email" href="mailto:janrenzofacto@gmail.com">Email Me Directly</a>
      </div>

      <div class="footer">
        Janrenzo Facto • Available Worldwide
      </div>
    </main>
  </body>
</html>
